<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BantayBigas</title>
    <link rel="stylesheet" href="./Assets/css/app.css">
</head>
<body>
    <!-- ─────────────────── NAVIGATION ─────────────────── -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Bantay<span class="logo-accent">Bigas</span></a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="directory.html" class="nav-link">Directory</a></li>
                <li><a href="apply.html" class="nav-link">Apply</a></li>
                <li><a href="login.html" class="nav-link active">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- ─────────────────── LOGIN FORM ─────────────────── -->
    <main class="login-page">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-desc">Sign in to your supplier or buyer account.</p>
            </div>
            <form class="login-form">
                <div class="form-group">
                    <label for="login-email" class="form-label">Email Address</label>
                    <input type="email" id="login-email" class="form-input" placeholder="you@company.com">
                </div>
                <div class="form-group">
                    <label for="login-password" class="form-label">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-login">Sign In</button>
            </form>
            <p class="login-footer-text">Don't have an account? <a href="apply.html" class="login-link">Apply as Supplier</a></p>
        </div>
    </main>

    <!-- ─────────────────── FOOTER ─────────────────── -->
    <footer class="footer">
        <div class="container footer-content">
            <p class="footer-text">&copy; 2026 BantayBigas. All rights reserved. A trusted B2B directory platform.</p>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="directory.html">Directory</a>
                <a href="apply.html">Apply</a>
                <a href="login.html">Login</a>
            </div>
        </div>
    </footer>
</body>
</html>
